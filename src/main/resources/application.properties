# ==========================
# Configuración General
# ==========================
spring.application.name=minimarket
server.port=8080

# ==========================
# Base de datos H2 (en memoria)
# ==========================
spring.datasource.url=jdbc:h2:mem:minimarketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (accesible en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allow access to the H2 web console from external hosts (development only)
spring.h2.console.settings.web-allow-others=true

# ==========================
# JPA / Hibernate
# ==========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Permite que data.sql se ejecute después de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ==========================
# Actuator (health checks para Docker/Jenkins)
# ==========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
