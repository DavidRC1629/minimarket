services:
  minimarket-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: minimarket-backend:latest
    container_name: minimarket-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - TZ=America/Lima
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  minimarket-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: minimarket-frontend:latest
    container_name: minimarket-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - minimarket-backend

# Nota: frontend y backend desplegados como servicios separados.
